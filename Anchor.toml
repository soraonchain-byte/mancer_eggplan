[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
# Ini adalah Program ID yang sudah sukses kamu deploy tadi
mancer_eggplan = "Ajd1Gfez1KTWSbDA9ZArQtoFWMS"

[registry]
url = "https://anchor.projectserum.com"

[provider]
# Kita menggunakan Devnet agar saldo 4-6 SOL kamu bisa digunakan
cluster = "devnet"
# Pastikan file wallet-keypair.json ada di folder yang sama dengan file ini
wallet = "wallet-keypair.json"

[scripts]
# Script standar untuk menjalankan testing di masa depan
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"